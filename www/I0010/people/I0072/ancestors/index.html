    <script

    <script>
    var points = [{"lat": "53.7045", "lon": "-0.8746", "name": "Goole", "url": "/I0010/places/P0008/", "people": [{"name": "Theodore Langford", "url": "/I0010/people/I0072/", "types": ["Birth"]}]}, {"lat": "53.7944", "lon": "-1.7519", "name": "Bradford", "url": "/I0010/places/P0004/", "people": [{"name": "Theodore Langford", "url": "/I0010/people/I0072/", "types": ["Child born"]}]}];
    var map = L.map('map');
    var bounds = points.map(p => [parseFloat(p.lat), parseFloat(p.lon)]);
    map.fitBounds(bounds, {padding: [20, 20], maxZoom: 10});
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
    }).addTo(map);
    points.forEach(function(p) {
      var peopleHtml = p.people.map(function(person) {
        return '<a href="' + person.url + '">' + person.name + '</a>: ' + person.types.join(', ');
      }).join('<br>');
      L.circleMarker([parseFloat(p.lat), parseFloat(p.lon)], {
        radius: Math.max(4, Math.min(14, 3 + p.people.length * 2)),
        color: '#5a3e28',
        fillColor: '#5a3e28',
        fillOpacity: 0.6,
        weight: 1,
      }).addTo(map)
        .bindPopup('<strong><a href="' + p.url + '">' + p.name + '</a></strong><br>' + peopleHtml);
    });
    </script>
  
  <script>
  var tabs = document.querySelector('.person-tabs');
  if (tabs) {
    var active = tabs.querySelector('span.active');
    if (active) {
      var btn = document.createElement('button');
      btn.className = 'tabs-toggle';
      btn.textContent = '▾';
      btn.setAttribute('aria-label', 'Toggle tabs');
      active.after(btn);
      btn.addEventListener('click', function() {
        var open = tabs.classList.toggle('open');
        btn.textContent = open ? '▴' : '▾';
      });
    }
  }

  var eventsTable = document.querySelector('.events table');
  if (eventsTable) {
    var headRow = eventsTable.querySelector('thead tr');
    var emptyTh = document.createElement('th');
    emptyTh.className = 'expand-td';
    headRow.appendChild(emptyTh);

    Array.from(eventsTable.querySelectorAll('tbody tr')).forEach(function(row) {
      var cell4 = row.cells[3];
      var cell5 = row.cells[4];

      var expandTd = document.createElement('td');
      expandTd.className = 'expand-td';
      row.appendChild(expandTd);

      var parts = [];
      if (cell4 && cell4.textContent.trim()) parts.push(cell4.innerHTML.trim());
      if (cell5 && cell5.textContent.trim()) parts.push(cell5.innerHTML.trim());
      if (!parts.length) return;

      var xbtn = document.createElement('button');
      xbtn.className = 'row-expand-btn';
      xbtn.textContent = '▾';
      expandTd.appendChild(xbtn);

      var detailRow = document.createElement('tr');
      detailRow.className = 'row-detail';
      var detailTd = document.createElement('td');
      detailTd.colSpan = row.cells.length;
      detailTd.innerHTML = parts.join(' &middot; ');
      detailRow.appendChild(detailTd);
      row.after(detailRow);

      xbtn.addEventListener('click', function() {
        var open = detailRow.classList.toggle('open');
        xbtn.textContent = open ? '▴' : '▾';
        detailRow.style.display = open ? '' : 'none';
      });
    });
  }
  </script>
