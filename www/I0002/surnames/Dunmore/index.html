<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dunmore — Family Tree</title>
  <link rel="stylesheet" href="/style.css">
  
  <link rel="stylesheet" media="print" href="/print.css">
  
</head>
<body>
  <header>
    <nav>
      <a href="/I0002/index.html">My tree</a>
      <button class="nav-toggle" aria-label="Toggle menu" aria-expanded="false" onclick="var l=document.getElementById('nav-links');var o=l.classList.toggle('open');this.setAttribute('aria-expanded',o)">&#9776;</button>
      <div id="nav-links" class="nav-links">
        <a class="secondary" href="/I0002/people/I0002/">Me</a>
        <a class="secondary" href="/I0002/people/">People</a>
        <a class="secondary" href="/I0002/places/">Places</a>
        <a class="secondary" href="/I0002/events/">Events</a>
        <a class="secondary" href="/I0002/census/">Census</a>
        <a class="secondary" href="/I0002/birthdays/">Birthdays</a>
        <a class="secondary" href="/I0002/surnames/">Surnames</a>
        <span class="secondary">Viewing as Ursula &mdash; <a href="/">switch</a></span>
      </div>
    </nav>
  </header>
  <main>
    
    <h1>Dunmore <span class="years">(1)</span></h1>
    <input type="search" id="search" placeholder="Search…">
    <div id="filters" class="event-filters"></div>
    <p id="count"></p>
    <table id="people-table">
      <thead>
        <tr>
          <th data-col="0" class="sortable sort-asc">Name</th>
          <th data-col="1" class="sortable">Born</th>
          <th data-col="2" class="sortable">Died</th>
        </tr>
      </thead>
      <tbody>
        <tr data-living="1" data-female="1" data-birth="1">
          <td data-val="Clara Dunmore">
            <a href="/I0002/people/I0077/" class="female">Clara Dunmore</a>
            
            
            
            
          </td>
          <td class="year" data-val="1984">1984</td>
          <td class="year" data-val=""></td>
        </tr>
      </tbody>
    </table>
  
  </main>
  <footer>
    <p><a href="https://www.gramps-project.org">GRAMPS</a> family tree website generated by <a href="https://github.com/bennuttall/greatgramps">greatgramps</a></p>
  </footer>
  
    <script>
    const tbody = document.querySelector('#people-table tbody');
    const rows = Array.from(tbody.querySelectorAll('tr'));
    const countEl = document.getElementById('count');
    const total = rows.length;

    function updateCount(visible) {
      countEl.textContent = visible === total ? `${total.toLocaleString()} people` : `${visible.toLocaleString()} of ${total.toLocaleString()} people`;
    }
    updateCount(total);

    let ancestorsOnly = false;
    let descendantsOnly = false;
    let livingOnly = false;
    let maleOnly = false;
    let femaleOnly = false;
    let marriedOnly = false;
    let birthOnly = false;

    function applyFilters() {
      const q = document.getElementById('search').value.toLowerCase();
      let visible = 0;
      rows.forEach(row => {
        const show = row.cells[0].textContent.toLowerCase().includes(q)
          && (!ancestorsOnly || row.dataset.ancestor)
          && (!descendantsOnly || row.dataset.descendant)
          && (!livingOnly || row.dataset.living)
          && (!maleOnly || row.dataset.male)
          && (!femaleOnly || row.dataset.female)
          && (!marriedOnly || row.dataset.married)
          && (!birthOnly || row.dataset.birth);
        row.hidden = !show;
        if (show) visible++;
      });
      updateCount(visible);
    }

    document.getElementById('search').addEventListener('input', applyFilters);

    const hasAncestors = rows.some(r => r.dataset.ancestor);
    const hasDescendants = rows.some(r => r.dataset.descendant);
    const hasLiving = rows.some(r => r.dataset.living);
    const hasMale = rows.some(r => r.dataset.male);
    const hasFemale = rows.some(r => r.dataset.female);
    const hasMarried = rows.some(r => r.dataset.married);
    const hasBirth = rows.some(r => r.dataset.birth);

    function makeToggle(label, activate) {
      const btn = document.createElement('button');
      btn.textContent = label;
      btn.className = 'filter-btn toggle-btn';
      btn.addEventListener('click', () => {
        activate(btn);
        applyFilters();
      });
      return btn;
    }

    const filtersEl = document.getElementById('filters');
    const ancestorBtn = hasAncestors ? makeToggle('Ancestors', btn => {
      ancestorsOnly = !ancestorsOnly;
      if (ancestorsOnly) { descendantsOnly = false; descendantBtn && descendantBtn.classList.remove('active'); }
      btn.classList.toggle('active', ancestorsOnly);
    }) : null;
    const descendantBtn = hasDescendants ? makeToggle('Descendants', btn => {
      descendantsOnly = !descendantsOnly;
      if (descendantsOnly) { ancestorsOnly = false; ancestorBtn && ancestorBtn.classList.remove('active'); }
      btn.classList.toggle('active', descendantsOnly);
    }) : null;
    if (ancestorBtn) filtersEl.appendChild(ancestorBtn);
    if (descendantBtn) filtersEl.appendChild(descendantBtn);
    if (hasLiving) filtersEl.appendChild(makeToggle('Living', btn => {
      livingOnly = !livingOnly;
      btn.classList.toggle('active', livingOnly);
    }));
    const maleBtn = hasMale ? makeToggle('Male', btn => {
      maleOnly = !maleOnly;
      if (maleOnly) { femaleOnly = false; femaleBtn && femaleBtn.classList.remove('active'); }
      btn.classList.toggle('active', maleOnly);
    }) : null;
    const femaleBtn = hasFemale ? makeToggle('Female', btn => {
      femaleOnly = !femaleOnly;
      if (femaleOnly) { maleOnly = false; maleBtn && maleBtn.classList.remove('active'); }
      btn.classList.toggle('active', femaleOnly);
    }) : null;
    if (maleBtn) filtersEl.appendChild(maleBtn);
    if (femaleBtn) filtersEl.appendChild(femaleBtn);
    const marriedBtn = hasMarried ? makeToggle('Married name', btn => {
      marriedOnly = !marriedOnly;
      if (marriedOnly) { birthOnly = false; birthBtn && birthBtn.classList.remove('active'); }
      btn.classList.toggle('active', marriedOnly);
    }) : null;
    const birthBtn = hasBirth ? makeToggle('Birth name', btn => {
      birthOnly = !birthOnly;
      if (birthOnly) { marriedOnly = false; marriedBtn && marriedBtn.classList.remove('active'); }
      btn.classList.toggle('active', birthOnly);
    }) : null;
    if (marriedBtn) filtersEl.appendChild(marriedBtn);
    if (birthBtn) filtersEl.appendChild(birthBtn);

    let sortCol = null, sortAsc = true;
    document.querySelectorAll('#people-table th').forEach(th => {
      th.style.cursor = 'pointer';
      th.addEventListener('click', () => {
        const col = parseInt(th.dataset.col);
        sortAsc = sortCol === col ? !sortAsc : true;
        sortCol = col;

        document.querySelectorAll('#people-table th').forEach(h => h.classList.remove('sort-asc', 'sort-desc'));
        th.classList.add(sortAsc ? 'sort-asc' : 'sort-desc');

        rows.sort((a, b) => {
          const aCell = a.cells[col];
          const bCell = b.cells[col];
          const aVal = aCell.dataset.val !== undefined ? aCell.dataset.val : aCell.textContent;
          const bVal = bCell.dataset.val !== undefined ? bCell.dataset.val : bCell.textContent;
          const aNum = parseFloat(aVal), bNum = parseFloat(bVal);
          let cmp;
          if (!isNaN(aNum) && !isNaN(bNum)) {
            cmp = aNum - bNum;
          } else {
            cmp = aVal.localeCompare(bVal);
          }
          return sortAsc ? cmp : -cmp;
        });
        rows.forEach(r => tbody.appendChild(r));
      });
    });
    </script>
  
  <script>
  var tabs = document.querySelector('.person-tabs');
  if (tabs) {
    var active = tabs.querySelector('span.active');
    if (active) {
      var btn = document.createElement('button');
      btn.className = 'tabs-toggle';
      btn.textContent = '▾';
      btn.setAttribute('aria-label', 'Toggle tabs');
      active.after(btn);
      btn.addEventListener('click', function() {
        var open = tabs.classList.toggle('open');
        btn.textContent = open ? '▴' : '▾';
      });
    }
  }

  var eventsTable = document.querySelector('.events table');
  if (eventsTable) {
    var headRow = eventsTable.querySelector('thead tr');
    var emptyTh = document.createElement('th');
    emptyTh.className = 'expand-td';
    headRow.appendChild(emptyTh);

    Array.from(eventsTable.querySelectorAll('tbody tr')).forEach(function(row) {
      var cell4 = row.cells[3];
      var cell5 = row.cells[4];

      var expandTd = document.createElement('td');
      expandTd.className = 'expand-td';
      row.appendChild(expandTd);

      var parts = [];
      if (cell4 && cell4.textContent.trim()) parts.push(cell4.innerHTML.trim());
      if (cell5 && cell5.textContent.trim()) parts.push(cell5.innerHTML.trim());
      if (!parts.length) return;

      var xbtn = document.createElement('button');
      xbtn.className = 'row-expand-btn';
      xbtn.textContent = '▾';
      expandTd.appendChild(xbtn);

      var detailRow = document.createElement('tr');
      detailRow.className = 'row-detail';
      var detailTd = document.createElement('td');
      detailTd.colSpan = row.cells.length;
      detailTd.innerHTML = parts.join(' &middot; ');
      detailRow.appendChild(detailTd);
      row.after(detailRow);

      xbtn.addEventListener('click', function() {
        var open = detailRow.classList.toggle('open');
        xbtn.textContent = open ? '▴' : '▾';
        detailRow.style.display = open ? '' : 'none';
      });
    });
  }
  </script>
</body>
</html>
